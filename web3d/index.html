<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModelSpec — 3D Knowledge Graph</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #060a13;
      color: #e2e8f0;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
      overflow: hidden;
    }

    #graph-container,
    #graph-container > div,
    #graph-container canvas {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      display: block !important;
      border: none !important; outline: none !important;
    }

    /* Panels */
    .panel {
      background: rgba(10, 18, 36, 0.92);
      border: 1px solid rgba(100, 116, 139, 0.25);
      border-radius: 8px;
      padding: 12px;
      backdrop-filter: blur(16px);
    }

    #controls {
      position: fixed; top: 52px; left: 16px; z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
      max-width: 300px;
    }

    .panel h1 { font-size: 15px; font-weight: 700; color: #f1f5f9; margin-bottom: 2px; }
    .panel .subtitle { font-size: 10px; color: #64748b; letter-spacing: 0.5px; }
    .panel h2 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
      color: #94a3b8; margin-bottom: 8px;
    }

    /* View buttons */
    .view-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .view-btn {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(100, 116, 139, 0.15);
      border-radius: 6px; padding: 5px 8px;
      color: #94a3b8; font-size: 10px; font-family: inherit;
      cursor: pointer; transition: all 0.15s; text-align: left;
    }
    .view-btn:hover { background: rgba(51, 65, 85, 0.8); color: #e2e8f0; }
    .view-btn.active {
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.4);
      color: #60a5fa;
    }

    /* Search */
    #search-input {
      width: 100%;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(100, 116, 139, 0.15);
      border-radius: 6px; padding: 6px 10px;
      color: #e2e8f0; font-family: inherit; font-size: 11px; outline: none;
    }
    #search-input:focus { border-color: rgba(59, 130, 246, 0.5); }
    .search-item {
      padding: 4px 0; cursor: pointer; color: #94a3b8; font-size: 11px;
    }
    .search-item:hover { color: #e2e8f0; }

    /* Legend */
    .legend-item {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 9px; color: #94a3b8; padding: 2px 0; margin-right: 10px;
    }
    .legend-icon { width: 14px; height: 14px; flex-shrink: 0; }

    /* Visibility tree */
    .vis-row {
      display: flex; align-items: center; gap: 4px; padding: 2px 0;
      cursor: pointer; user-select: none;
    }
    .vis-row:hover { background: rgba(100,116,139,0.08); border-radius: 4px; }
    .vis-eye { width: 16px; text-align: center; font-size: 12px; opacity: 0.7; }
    .vis-eye.hidden { opacity: 0.25; }
    .vis-label { flex: 1; color: #94a3b8; font-size: 11px; }
    .vis-count { font-size: 9px; color: #475569; min-width: 24px; text-align: right; }
    .vis-expand { width: 14px; text-align: center; font-size: 10px; color: #475569; cursor: pointer; }
    .vis-sub { padding-left: 20px; }
    .vis-sub .vis-label { font-size: 10px; color: #64748b; }

    /* Stats bar */
    #stats { position: fixed; bottom: 16px; left: 16px; z-index: 100; }
    .stat-row {
      display: flex; gap: 16px; font-size: 10px; color: #64748b;
    }
    .stat-val { color: #94a3b8; font-weight: 600; }

    /* Detail panel */
    #detail-panel {
      position: fixed; top: 52px; right: 16px; z-index: 100;
      max-width: 360px; max-height: calc(100vh - 68px); overflow-y: auto;
      display: none;
    }
    #detail-panel.visible { display: block; }
    .detail-header { display: flex; justify-content: space-between; align-items: center; }
    .detail-close {
      background: none; border: none; color: #64748b;
      cursor: pointer; font-size: 18px; padding: 4px;
    }
    .detail-close:hover { color: #e2e8f0; }
    .detail-label {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px;
    }
    .detail-props { font-size: 11px; line-height: 1.8; }
    .detail-props .key { color: #64748b; }
    .detail-props .val { color: #e2e8f0; }
    .detail-rels { margin-top: 8px; font-size: 10px; }
    .detail-rels .rel-item {
      padding: 3px 0; border-bottom: 1px solid rgba(100,116,139,0.1);
      display: flex; gap: 6px; align-items: center;
    }
    .rel-type { color: #60a5fa; font-weight: 500; }
    .rel-arrow { color: #475569; }
    .rel-peer { color: #94a3b8; cursor: pointer; }
    .rel-peer:hover { color: #e2e8f0; }

    /* Loading */
    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 200; text-align: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>
  <nav id="graph-nav" style="position:fixed;top:0;left:0;right:0;height:36px;display:flex;align-items:center;z-index:150;background:rgba(6,10,19,0.9);border-bottom:1px solid rgba(100,116,139,0.15);backdrop-filter:blur(12px)">
    <div style="padding:0 16px;font-size:13px;font-weight:700;color:#f1f5f9;border-right:1px solid rgba(100,116,139,0.15);height:100%;display:flex;align-items:center">ModelSpec</div>
    <a href="/graph" style="padding:0 14px;height:100%;display:flex;align-items:center;color:#60a5fa;text-decoration:none;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;border-bottom:2px solid #3b82f6">3D Graph</a>
    <a href="/downselect" style="padding:0 14px;height:100%;display:flex;align-items:center;color:#64748b;text-decoration:none;font-size:10px;letter-spacing:0.5px;text-transform:uppercase">Downselect</a>

      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>

  <div id="graph-container"></div>

  <div id="loading">
    <div class="spinner"></div>
    <div style="font-size: 12px; color: #64748b;">Loading knowledge graph...</div>
  </div>

  <div id="controls">
    <div class="panel">
      <h1>ModelSpec</h1>
      <div class="subtitle">3D Model Intelligence Graph</div>
    </div>

    <div class="panel">
      <h2>Edge View</h2>
      <div class="view-grid" id="view-buttons"></div>
    </div>

    <div class="panel">
      <h2>Search</h2>
      <input type="text" id="search-input" placeholder="Model name, provider, or type...">
      <div id="search-results"></div>
    </div>

    <div class="panel">
      <h2>Layout</h2>
      <div style="display:flex;gap:4px">
        <button class="view-btn active" id="btn-labels" onclick="toggleLabels()">Labels</button>
      </div>
    </div>

    <div class="panel">
      <h2>Gravity Well</h2>
      <div style="display:flex;gap:4px;margin-bottom:6px">
        <button class="view-btn" id="btn-gravity" onclick="toggleGravity()" style="flex:0 0 auto;padding:4px 10px;">Off</button>
        <select id="gravity-metric" style="flex:1;background:rgba(30,41,59,0.7);border:1px solid rgba(100,116,139,0.15);border-radius:6px;padding:5px 8px;color:#e2e8f0;font-family:inherit;font-size:11px;outline:none;">
          <optgroup label="Model Properties">
            <option value="total_parameters">Parameters</option>
            <option value="context_window">Context Window</option>

          </optgroup>
          <optgroup label="Benchmarks">
            <option value="bench:humaneval">HumanEval</option>
            <option value="bench:swe_bench_verified">SWE-bench Verified</option>
            <option value="bench:gpqa_diamond">GPQA Diamond</option>
            <option value="bench:mmlu_pro">MMLU-Pro</option>
            <option value="bench:math_500">MATH-500</option>
            <option value="bench:mteb_overall">MTEB Overall</option>
            <option value="bench:arena_elo_coding">Arena ELO Coding</option>
            <option value="bench:terminal_bench_2">Terminal-Bench 2.0</option>
            <option value="bench:aider_polyglot">Aider Polyglot</option>
            <option value="bench:helm_safety">HELM Safety</option>

          <optgroup label="Downselect Score">
            <option value="downselect:general">General</option>
            <option value="downselect:coding">Coding</option>
            <option value="downselect:coding_rust">Coding (Rust)</option>
            <option value="downselect:reasoning">Reasoning</option>
            <option value="downselect:agentic">Agentic</option>
            <option value="downselect:medical">Medical</option>
            <option value="downselect:embedding">Embedding</option>

          <optgroup label="Saved Rankings">

      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
        <span style="font-size:8px;color:#475569">OFF</span>
        <input type="range" id="gravity-slider" min="0" max="100" value="0"

          oninput="updateGravitySlider(this.value)">
        <span style="font-size:8px;color:#475569">MAX</span>
        <span id="gravity-val" style="font-size:11px;color:#64748b;font-weight:600;min-width:28px;text-align:right">0%</span>
      </div>
      <div id="gravity-status" style="font-size:10px;color:#475569;margin-top:4px;"></div>
    </div>

    <div class="panel">
      <h2>Saved Rankings</h2>
      <select id="saved-ranking-select" style="width:100%;background:rgba(30,41,59,0.7);border:1px solid rgba(100,116,139,0.15);border-radius:6px;padding:5px 8px;color:#e2e8f0;font-family:inherit;font-size:11px;outline:none;margin-bottom:6px;">
        <option value="">Load a saved ranking...</option>
      </select>
      <div style="display:flex;gap:4px">
        <button class="view-btn" id="btn-load-ranking" onclick="loadSavedRankingToGraph()" style="flex:1;">Filter Graph</button>
        <button class="view-btn" id="btn-clear-ranking" onclick="clearRankingFilter()" style="flex:0 0 auto;">Clear</button>
      </div>
      <div id="ranking-filter-status" style="font-size:10px;color:#475569;margin-top:4px;"></div>

    <div class="panel" id="legend-panel">

    <div class="panel" id="visibility-panel">

        <button class="view-btn" onclick="hideAllTypes()" style="flex:1;font-size:10px;">None</button>
        <button class="view-btn" onclick="modelsOnlyTypes()" style="flex:1;font-size:10px;">Models</button>
      </div>
      <div id="visibility-tree" style="font-size:11px;"></div>

  <div id="detail-panel" class="panel">
    <div class="detail-header">
      <h2>Node Detail</h2>
      <button class="detail-close" onclick="closeDetail()">&times;</button>
    </div>
    <div id="detail-content"></div>
  </div>

  <div id="stats" class="panel">
    <div class="stat-row">
      <span>Nodes: <span class="stat-val" id="stat-nodes">0</span></span>
      <span>Edges: <span class="stat-val" id="stat-edges">0</span></span>
      <span>View: <span class="stat-val" id="stat-view">-</span></span>
    </div>
  </div>

  <script src="https://unpkg.com/3d-force-graph@1"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════════════════════
    const API = '';
    let currentView = 'provider';
    let graph3d = null;
    let graphData = { nodes: [], links: [] };
    let labelsVisible = true;

    // ═══════════════════════════════════════════════════════════════
    // 3MOTICON COLORS — one per model_type / node label
    // ═══════════════════════════════════════════════════════════════
    const TYPE_COLORS = {
      'llm-chat':           '#3b82f6',
      'llm-reasoning':      '#8b5cf6',
      'llm-code':           '#22c55e',
      'llm-base':           '#6b7280',
      'vlm':                '#14b8a6',
      'embedding-text':     '#f59e0b',
      'image-generation':   '#ec4899',
      'video-generation':   '#f43f5e',
      'audio-asr':          '#06b6d4',
      'audio-tts':          '#0ea5e9',
      'safety-classifier':  '#ef4444',
      'reward-model':       '#fbbf24',
      'reranker':           '#a855f7',
      'document-ocr':       '#84cc16',
      'audio-realtime':     '#06b6d4',
    };

    const LABEL_COLORS = {
      'Provider':    '#f97316',
      'Platform':    '#06b6d4',
      'Capability':  '#22c55e',
      'Benchmark':   '#eab308',
      'Hardware':    '#a855f7',
      'License':     '#94a3b8',
      'Tag':         '#64748b',
      'UseCase':     '#14b8a6',
    };

    const EDGE_COLORS = {
      'MADE_BY':        '#f97316',
      'DERIVED_FROM':   '#8b5cf6',
      'HAS_CAPABILITY': '#22c55e',
      'SCORED_ON':      '#eab308',
      'FITS_ON':        '#a855f7',
      'AVAILABLE_ON':   '#06b6d4',
      'LICENSED_AS':    '#94a3b8',
      'TAGGED_WITH':    '#64748b',
      'COMPETES_WITH':  '#ef4444',
      'MERGED_FROM':    '#ec4899',
    };

    function nodeColor(n) {
      if (n.label === 'Model') return TYPE_COLORS[n.model_type] || '#64748b';
      return LABEL_COLORS[n.label] || '#475569';
    }

    function nodeSize(n) {
      if (n.label !== 'Model') return { Provider: 8, Platform: 5, Capability: 4, Benchmark: 4, Hardware: 5, License: 3, Tag: 2 }[n.label] || 3;
      const p = n.total_parameters;
      if (!p) return 4;
      return Math.max(3, Math.min(14, Math.log10(p / 1e8) * 3 + 4));
    }

    // ═══════════════════════════════════════════════════════════════
    // 3MOTICONS — Programmatic 3D mesh icons
    // ═══════════════════════════════════════════════════════════════

    function make3moticon(type, color, size) {
      const c = new THREE.Color(color);
      const mat = () => new THREE.MeshLambertMaterial({
        color: c, transparent: true, opacity: 0.88,
        emissive: c, emissiveIntensity: 0.2,
      });
      const wireMat = () => new THREE.MeshBasicMaterial({
        color: c, wireframe: true, transparent: true, opacity: 0.3,
      });

      switch (type) {
        case 'llm-chat': return makeSpeechBubble(size, mat());
        case 'llm-reasoning': return makeLightbulb(size, mat());
        case 'llm-code': return makeCodeBrackets(size, mat());
        case 'llm-base': return makeCube(size, mat());
        case 'vlm': return makeEye(size, mat(), c);
        case 'embedding-text': return makeMagnet(size, mat(), c);
        case 'image-generation': return makePalette(size, mat(), c);
        case 'video-generation': return makeClapboard(size, mat());
        case 'audio-asr': return makeMicrophone(size, mat(), c);
        case 'audio-tts': return makeSpeaker(size, mat(), c);
        case 'audio-realtime': return makeSpeaker(size, mat(), c);
        case 'safety-classifier': return makeShield(size, mat());
        case 'reward-model': return makeStar(size, mat());
        case 'reranker': return makeFunnel(size, mat());
        case 'document-ocr': return makeDocument(size, mat());
        // Node labels (non-model)
        case '_Provider': return makeBuilding(size, mat());
        case '_Platform': return makeCloud(size, mat(), c);
        case '_Hardware': return makeChip(size, mat());
        case '_Capability': return makeGear(size, mat());
        case '_Benchmark': return makeTarget(size, mat(), c);
        default: return makeSphere(size, mat());
      }
    }

    // ─── Shape builders ────────────────────────────────────────

    function makeSpeechBubble(s, mat) {
      const shape = new THREE.Shape();
      const r = s * 0.8;
      // Rounded rectangle
      shape.moveTo(-r, -r * 0.6);
      shape.lineTo(-r, r * 0.5);
      shape.quadraticCurveTo(-r, r * 0.7, -r * 0.7, r * 0.7);
      shape.lineTo(r * 0.7, r * 0.7);
      shape.quadraticCurveTo(r, r * 0.7, r, r * 0.5);
      shape.lineTo(r, -r * 0.6);
      shape.quadraticCurveTo(r, -r * 0.8, r * 0.7, -r * 0.8);
      // Tail
      shape.lineTo(-r * 0.1, -r * 0.8);
      shape.lineTo(-r * 0.4, -r * 1.2);
      shape.lineTo(-r * 0.5, -r * 0.8);
      shape.lineTo(-r * 0.7, -r * 0.8);
      shape.quadraticCurveTo(-r, -r * 0.8, -r, -r * 0.6);
      const geo = new THREE.ExtrudeGeometry(shape, { depth: s * 0.3, bevelEnabled: true, bevelThickness: 0.3, bevelSize: 0.2, bevelSegments: 2 });
      geo.center();
      return new THREE.Mesh(geo, mat);
    }

    function makeLightbulb(s, mat) {
      const group = new THREE.Group();
      // Bulb (sphere top)
      const bulb = new THREE.Mesh(new THREE.SphereGeometry(s * 0.55, 16, 12), mat);
      bulb.position.y = s * 0.3;
      group.add(bulb);
      // Base (cylinder)
      const base = new THREE.Mesh(new THREE.CylinderGeometry(s * 0.3, s * 0.35, s * 0.4, 8), mat);
      base.position.y = -s * 0.3;
      group.add(base);
      // Filament rays
      for (let i = 0; i < 4; i++) {
        const ray = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, s * 0.5, 4), mat.clone());
        ray.material.emissiveIntensity = 0.5;
        const angle = (i / 4) * Math.PI * 2;
        ray.position.set(Math.cos(angle) * s * 0.7, s * 0.4, Math.sin(angle) * s * 0.7);
        ray.rotation.z = Math.PI / 4;
        ray.rotation.y = angle;
        group.add(ray);
      }
      return group;
    }

    function makeCodeBrackets(s, mat) {
      const group = new THREE.Group();
      // Left bracket <
      const left = new THREE.Shape();
      left.moveTo(s * 0.3, s * 0.6);
      left.lineTo(-s * 0.3, 0);
      left.lineTo(s * 0.3, -s * 0.6);
      left.lineTo(s * 0.5, -s * 0.45);
      left.lineTo(0, 0);
      left.lineTo(s * 0.5, s * 0.45);
      const lg = new THREE.ExtrudeGeometry(left, { depth: s * 0.2, bevelEnabled: false });
      const lm = new THREE.Mesh(lg, mat);
      lm.position.x = -s * 0.4;
      group.add(lm);
      // Right bracket >
      const right = new THREE.Shape();
      right.moveTo(-s * 0.3, s * 0.6);
      right.lineTo(s * 0.3, 0);
      right.lineTo(-s * 0.3, -s * 0.6);
      right.lineTo(-s * 0.5, -s * 0.45);
      right.lineTo(0, 0);
      right.lineTo(-s * 0.5, s * 0.45);
      const rg = new THREE.ExtrudeGeometry(right, { depth: s * 0.2, bevelEnabled: false });
      const rm = new THREE.Mesh(rg, mat);
      rm.position.x = s * 0.4;
      group.add(rm);
      // Slash /
      const slash = new THREE.Mesh(
        new THREE.BoxGeometry(s * 0.15, s * 0.9, s * 0.15),
        mat
      );
      slash.rotation.z = -Math.PI / 6;
      group.add(slash);
      return group;
    }

    function makeEye(s, mat, c) {
      const group = new THREE.Group();
      // Outer almond shape (torus squished)
      const outer = new THREE.Mesh(
        new THREE.TorusGeometry(s * 0.5, s * 0.15, 8, 24),
        mat
      );
      outer.scale.set(1.2, 0.7, 0.4);
      group.add(outer);
      // Iris
      const iris = new THREE.Mesh(
        new THREE.SphereGeometry(s * 0.35, 16, 12),
        new THREE.MeshLambertMaterial({ color: c, emissive: c, emissiveIntensity: 0.4, transparent: true, opacity: 0.9 })
      );
      group.add(iris);
      // Pupil
      const pupil = new THREE.Mesh(
        new THREE.SphereGeometry(s * 0.15, 12, 8),
        new THREE.MeshBasicMaterial({ color: 0x000000 })
      );
      pupil.position.z = s * 0.2;
      group.add(pupil);
      return group;
    }

    function makeMagnet(s, mat, c) {
      const group = new THREE.Group();
      // Three interlocking rings
      for (let i = 0; i < 3; i++) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(s * 0.45, s * 0.08, 8, 24),
          mat.clone()
        );
        ring.rotation.x = (i / 3) * Math.PI;
        ring.rotation.y = (i / 3) * Math.PI * 0.5;
        group.add(ring);
      }
      // Center sphere
      const core = new THREE.Mesh(
        new THREE.SphereGeometry(s * 0.2, 12, 8),
        new THREE.MeshLambertMaterial({ color: c, emissive: c, emissiveIntensity: 0.5, transparent: true, opacity: 0.9 })
      );
      group.add(core);
      return group;
    }

    function makeShield(s, mat) {
      const shape = new THREE.Shape();
      shape.moveTo(0, s * 0.8);
      shape.quadraticCurveTo(s * 0.7, s * 0.6, s * 0.7, s * 0.1);
      shape.lineTo(s * 0.7, -s * 0.1);
      shape.quadraticCurveTo(s * 0.5, -s * 0.7, 0, -s * 0.9);
      shape.quadraticCurveTo(-s * 0.5, -s * 0.7, -s * 0.7, -s * 0.1);
      shape.lineTo(-s * 0.7, s * 0.1);
      shape.quadraticCurveTo(-s * 0.7, s * 0.6, 0, s * 0.8);
      const geo = new THREE.ExtrudeGeometry(shape, { depth: s * 0.25, bevelEnabled: true, bevelThickness: 0.2, bevelSize: 0.15, bevelSegments: 2 });
      geo.center();
      return new THREE.Mesh(geo, mat);
    }

    function makeStar(s, mat) {
      const shape = new THREE.Shape();
      const pts = 5;
      for (let i = 0; i < pts * 2; i++) {
        const angle = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
        const r = i % 2 === 0 ? s * 0.7 : s * 0.3;
        if (i === 0) shape.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
        else shape.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
      }
      shape.closePath();
      const geo = new THREE.ExtrudeGeometry(shape, { depth: s * 0.2, bevelEnabled: true, bevelThickness: 0.15, bevelSize: 0.1, bevelSegments: 1 });
      geo.center();
      return new THREE.Mesh(geo, mat);
    }

    function makeFunnel(s, mat) {
      const geo = new THREE.CylinderGeometry(s * 0.2, s * 0.6, s * 1.2, 8, 1, true);
      return new THREE.Mesh(geo, mat);
    }

    function makePalette(s, mat, c) {
      const group = new THREE.Group();
      // Flat ellipse body
      const body = new THREE.Mesh(
        new THREE.SphereGeometry(s * 0.6, 16, 8),
        mat
      );
      body.scale.set(1.3, 0.3, 1);
      group.add(body);
      // Paint dots
      const colors = [0xef4444, 0x3b82f6, 0x22c55e, 0xeab308];
      for (let i = 0; i < 4; i++) {
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(s * 0.12, 8, 6),
          new THREE.MeshLambertMaterial({ color: colors[i] })
        );
        const angle = (i / 4) * Math.PI * 1.5 + 0.5;
        dot.position.set(Math.cos(angle) * s * 0.35, s * 0.15, Math.sin(angle) * s * 0.35);
        group.add(dot);
      }
      return group;
    }

    function makeMicrophone(s, mat, c) {
      const group = new THREE.Group();
      // Capsule head
      const head = new THREE.Mesh(new THREE.SphereGeometry(s * 0.35, 12, 8), mat);
      head.position.y = s * 0.3;
      head.scale.set(1, 1.3, 1);
      group.add(head);
      // Stand
      const stand = new THREE.Mesh(new THREE.CylinderGeometry(s * 0.08, s * 0.08, s * 0.7, 6), mat);
      stand.position.y = -s * 0.3;
      group.add(stand);
      // Base
      const base = new THREE.Mesh(new THREE.CylinderGeometry(s * 0.25, s * 0.3, s * 0.1, 8), mat);
      base.position.y = -s * 0.7;
      group.add(base);
      return group;
    }

    function makeSpeaker(s, mat, c) {
      const group = new THREE.Group();
      // Box body
      const body = new THREE.Mesh(new THREE.BoxGeometry(s * 0.6, s * 0.8, s * 0.5), mat);
      group.add(body);
      // Cone
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(s * 0.5, s * 0.4, 12),
        mat.clone()
      );
      cone.rotation.x = -Math.PI / 2;
      cone.position.z = s * 0.4;
      group.add(cone);
      // Sound wave arcs
      for (let i = 1; i <= 2; i++) {
        const arc = new THREE.Mesh(
          new THREE.TorusGeometry(s * 0.3 * i, s * 0.03, 4, 12, Math.PI * 0.7),
          new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.4 - i * 0.1 })
        );
        arc.rotation.y = Math.PI / 2;
        arc.position.z = s * 0.5 + i * s * 0.15;
        group.add(arc);
      }
      return group;
    }

    function makeClapboard(s, mat) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(s * 1, s * 0.7, s * 0.1), mat);
      group.add(body);
      const clap = new THREE.Mesh(new THREE.BoxGeometry(s * 1, s * 0.15, s * 0.08), mat.clone());
      clap.material.emissiveIntensity = 0.4;
      clap.position.y = s * 0.42;
      clap.rotation.z = 0.15;
      group.add(clap);
      return group;
    }

    function makeDocument(s, mat) {
      const shape = new THREE.Shape();
      shape.moveTo(-s * 0.4, -s * 0.55);
      shape.lineTo(-s * 0.4, s * 0.55);
      shape.lineTo(s * 0.2, s * 0.55);
      shape.lineTo(s * 0.4, s * 0.35);
      shape.lineTo(s * 0.4, -s * 0.55);
      shape.closePath();
      const geo = new THREE.ExtrudeGeometry(shape, { depth: s * 0.08, bevelEnabled: false });
      geo.center();
      return new THREE.Mesh(geo, mat);
    }

    function makeBuilding(s, mat) {
      const group = new THREE.Group();
      const tower = new THREE.Mesh(new THREE.BoxGeometry(s * 0.6, s * 1.2, s * 0.5), mat);
      tower.position.y = s * 0.1;
      group.add(tower);
      const wing = new THREE.Mesh(new THREE.BoxGeometry(s * 0.9, s * 0.6, s * 0.4), mat.clone());
      wing.material.opacity = 0.7;
      wing.position.y = -s * 0.3;
      group.add(wing);
      // Windows (dots)
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 2; c++) {
          const w = new THREE.Mesh(
            new THREE.PlaneGeometry(s * 0.1, s * 0.1),
            new THREE.MeshBasicMaterial({ color: 0xfbbf24, transparent: true, opacity: 0.7 })
          );
          w.position.set(-s * 0.1 + c * s * 0.2, s * 0.5 - r * s * 0.25, s * 0.26);
          group.add(w);
        }
      }
      return group;
    }

    function makeCloud(s, mat, c) {
      const group = new THREE.Group();
      const positions = [[0, 0, 0], [-s*0.3, -s*0.1, 0], [s*0.3, -s*0.1, 0], [s*0.15, s*0.15, 0], [-s*0.15, s*0.12, 0]];
      const sizes = [s*0.3, s*0.22, s*0.22, s*0.2, s*0.18];
      positions.forEach((pos, i) => {
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(sizes[i], 12, 8), mat);
        sphere.position.set(...pos);
        group.add(sphere);
      });
      return group;
    }

    function makeChip(s, mat) {
      const group = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(s * 0.8, s * 0.15, s * 0.8), mat);
      group.add(body);
      // Pins on each side
      for (let side = 0; side < 4; side++) {
        for (let i = 0; i < 3; i++) {
          const pin = new THREE.Mesh(
            new THREE.BoxGeometry(s * 0.05, s * 0.05, s * 0.15),
            mat
          );
          const offset = (i - 1) * s * 0.25;
          if (side === 0) pin.position.set(offset, 0, s * 0.5);
          else if (side === 1) pin.position.set(offset, 0, -s * 0.5);
          else if (side === 2) { pin.rotation.y = Math.PI/2; pin.position.set(s * 0.5, 0, offset); }
          else { pin.rotation.y = Math.PI/2; pin.position.set(-s * 0.5, 0, offset); }
          group.add(pin);
        }
      }
      return group;
    }

    function makeGear(s, mat) {
      const shape = new THREE.Shape();
      const teeth = 8;
      for (let i = 0; i < teeth; i++) {
        const a1 = (i / teeth) * Math.PI * 2;
        const a2 = ((i + 0.3) / teeth) * Math.PI * 2;
        const a3 = ((i + 0.5) / teeth) * Math.PI * 2;
        const a4 = ((i + 0.8) / teeth) * Math.PI * 2;
        const ri = s * 0.35, ro = s * 0.55;
        if (i === 0) shape.moveTo(Math.cos(a1) * ri, Math.sin(a1) * ri);
        shape.lineTo(Math.cos(a2) * ro, Math.sin(a2) * ro);
        shape.lineTo(Math.cos(a3) * ro, Math.sin(a3) * ro);
        shape.lineTo(Math.cos(a4) * ri, Math.sin(a4) * ri);
      }
      shape.closePath();
      // Center hole
      const hole = new THREE.Path();
      for (let i = 0; i <= 16; i++) {
        const a = (i / 16) * Math.PI * 2;
        if (i === 0) hole.moveTo(Math.cos(a) * s * 0.12, Math.sin(a) * s * 0.12);
        else hole.lineTo(Math.cos(a) * s * 0.12, Math.sin(a) * s * 0.12);
      }
      shape.holes.push(hole);
      const geo = new THREE.ExtrudeGeometry(shape, { depth: s * 0.15, bevelEnabled: false });
      geo.center();
      return new THREE.Mesh(geo, mat);
    }

    function makeTarget(s, mat, c) {
      const group = new THREE.Group();
      [s*0.5, s*0.3].forEach((r, i) => {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(r, s * 0.04, 6, 24),
          i === 0 ? mat : mat.clone()
        );
        group.add(ring);
      });
      const bull = new THREE.Mesh(new THREE.SphereGeometry(s * 0.1, 8, 6),
        new THREE.MeshLambertMaterial({ color: c, emissive: c, emissiveIntensity: 0.6 })
      );
      group.add(bull);
      return group;
    }

    function makeCube(s, mat) { return new THREE.Mesh(new THREE.BoxGeometry(s*0.8, s*0.8, s*0.8), mat); }
    function makeSphere(s, mat) { return new THREE.Mesh(new THREE.SphereGeometry(s * 0.5, 16, 12), mat); }

    // ═══════════════════════════════════════════════════════════════
    // TEXT SPRITES
    // ═══════════════════════════════════════════════════════════════

    function makeTextSprite(text, color) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const fontSize = 24;
      ctx.font = `${fontSize}px monospace`;
      const textWidth = ctx.measureText(text).width;
      canvas.width = textWidth + 16;
      canvas.height = fontSize + 8;
      ctx.font = `${fontSize}px monospace`;
      ctx.fillStyle = color || '#e2e8f0';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(canvas.width / 6, canvas.height / 6, 1);
      return sprite;
    }

    // ═══════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════

    async function init() {
      // Load available views
      const views = await fetch(`${API}/api/v1/views`).then(r => r.json());
      const grid = document.getElementById('view-buttons');
      views.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'view-btn' + (v.id === currentView ? ' active' : '');
        btn.textContent = v.label;
        btn.dataset.view = v.id;
        btn.onclick = () => switchView(v.id);
        grid.appendChild(btn);
      });

      // Init 3D graph
      const container = document.getElementById('graph-container');
      graph3d = ForceGraph3D()(container)
        .width(window.innerWidth)
        .height(window.innerHeight)
        .backgroundColor('#060a13')
        .nodeLabel(n => `${n.display_name || n.id} (${n.label}${n.model_type ? ': ' + n.model_type : ''})`)
        .nodeColor(n => nodeColor(n))
        .nodeVal(n => nodeSize(n))
        .nodeOpacity(0.9)
        .linkColor(e => EDGE_COLORS[e.type] || '#1e293b')
        .linkOpacity(0.5)
        .linkWidth(0.5)
        .linkDirectionalArrowLength(3)
        .linkDirectionalArrowRelPos(1)
        .onNodeClick(n => showNodeDetail(n.id))
        .onNodeHover(n => { container.style.cursor = n ? 'pointer' : 'default'; })
        .nodeThreeObject(n => {
          const size = nodeSize(n) * 0.7;
          const color = nodeColor(n);
          const type = n.label === 'Model' ? (n.model_type || 'llm-chat') : ('_' + n.label);

          const group = new THREE.Group();
          const icon = make3moticon(type, color, size);
          group.add(icon);

          // Slow rotation
          icon.userData.rotates = true;

          // Label
          if (labelsVisible && n.display_name) {
            const labelText = n.display_name.length > 20
              ? n.display_name.substring(0, 18) + '..'
              : n.display_name;
            const sprite = makeTextSprite(labelText, color);
            sprite.position.set(0, size + 3, 0);
            group.add(sprite);
          }

          return group;
        })
        .d3AlphaDecay(0.02)
        .d3VelocityDecay(0.3);

      // Add ambient + directional light for Lambert materials
      const scene = graph3d.scene();
      scene.add(new THREE.AmbientLight(0x404060, 2));
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(100, 200, 100);
      scene.add(dirLight);
      const dirLight2 = new THREE.DirectionalLight(0x6366f1, 0.8);
      dirLight2.position.set(-100, -50, -100);
      scene.add(dirLight2);

      // Animate rotation of 3moticons + gravity well
      (function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        graphData.nodes.forEach(n => {
          if (n.__threeObj) {
            const icon = n.__threeObj.children[0];
            if (icon && icon.userData && icon.userData.rotates) {
              icon.rotation.y = time * 0.3;
            }
          }
        });
        // Animate gravity well
        if (gravityWellMesh && gravityWellMesh.visible) {
          gravityWellMesh.rotation.y = time * 0.2;
          gravityWellMesh.children.forEach(child => {
            if (child.userData && child.userData.isHalo) {
              const pulse = 1.0 + Math.sin(time * 2) * 0.15;
              child.scale.set(pulse, pulse, pulse);
            }
          });
        }
      })();

      await switchView(currentView);
      document.getElementById('loading').style.display = 'none';

      // Search
      document.getElementById('search-input').addEventListener('input', debounce(handleSearch, 300));

      // Gravity Well
      document.getElementById('gravity-metric').addEventListener('change', () => {
        if (gravityActive) onGravityChange();
      });

      // Saved Rankings — populate dropdown from localStorage
      populateSavedRankings();
    }

    // ═══════════════════════════════════════════════════════════════
    // GRAVITY WELL
    // ═══════════════════════════════════════════════════════════════

    let gravityWellMesh = null;
    let gravityActive = false;
    let gravityScores = {};  // nodeId -> normalized 0-1 value
    let rankingFilterActive = false;
    let rankingFilterModels = null;  // Set of model IDs to show, or null
    const GRAVITY_WELL_POS = { x: 0, y: 150, z: 0 };

    function createGravityWellMesh() {
      if (gravityWellMesh) return;
      const scene = graph3d.scene();
      const group = new THREE.Group();
      const coreGeo = new THREE.SphereGeometry(4, 32, 32);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.9 });
      group.add(new THREE.Mesh(coreGeo, coreMat));
      for (let i = 1; i <= 3; i++) {
        const ringGeo = new THREE.RingGeometry(4 + i * 3, 5 + i * 3, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x6366f1, transparent: true, opacity: 0.15 / i, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI * 0.5 * (i % 2);
        ring.rotation.y = Math.PI * 0.3 * i;
        group.add(ring);
      }
      const haloGeo = new THREE.SphereGeometry(8, 16, 16);
      const haloMat = new THREE.MeshBasicMaterial({ color: 0x6366f1, transparent: true, opacity: 0.08, wireframe: true });
      const halo = new THREE.Mesh(haloGeo, haloMat);
      halo.userData.isHalo = true;
      group.add(halo);
      group.position.set(GRAVITY_WELL_POS.x, GRAVITY_WELL_POS.y, GRAVITY_WELL_POS.z);
      group.visible = false;
      scene.add(group);
      gravityWellMesh = group;
    }

    function toggleGravity() {
      const btn = document.getElementById('btn-gravity');
      if (gravityActive) {
        // Turn off
        gravityActive = false;
        gravityScores = {};
        btn.textContent = 'Off';
        btn.classList.remove('active');
        document.getElementById('gravity-status').textContent = '';
        if (gravityWellMesh) gravityWellMesh.visible = false;
        graph3d.d3Force('gravity', null);
        graph3d.d3ReheatSimulation();
      } else {
        // Turn on with current metric
        btn.textContent = 'On';
        btn.classList.add('active');
        onGravityChange();
      }
    }

    async function onGravityChange() {
      const metric = document.getElementById('gravity-metric').value;
      const status = document.getElementById('gravity-status');
      status.textContent = 'Loading scores...';

      // Compute scores based on metric type
      if (metric.startsWith('saved:')) {
        // Load from saved ranking
        const savedName = metric.split(':').slice(1).join(':');
        const saved = getSavedRankings().find(r => r.name === savedName);
        gravityScores = {};
        if (saved && saved.results) {
          const maxScore = saved.results[0]?.score || 1;
          saved.results.forEach(r => {
            gravityScores[r.model_id] = r.score / maxScore;
          });
        }
      } else if (metric.startsWith('downselect:')) {
        const useCase = metric.split(':')[1];
        try {
          const resp = await fetch(`${API}/api/v1/rank`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ use_case: useCase, limit: 500 }),
          });
          const data = await resp.json();
          gravityScores = {};
          if (data.ranked && data.ranked.length > 0) {
            const maxScore = data.ranked[0].score;
            data.ranked.forEach(r => { gravityScores[r.model_id] = r.score / maxScore; });
          }
        } catch (e) {
          status.textContent = 'Error fetching rankings';
          return;
        }
      } else if (metric.startsWith('bench:')) {
        const benchId = metric.split(':')[1];
        gravityScores = {};
        let maxVal = 0;
        graphData.nodes.forEach(n => {
          if (n.label === 'Model') {
            const edge = graphData.links.find(e =>
              (e.source === n.id || e.source?.id === n.id) &&
              (e.target === benchId || e.target?.id === benchId) &&
              e.type === 'SCORED_ON'
            );
            if (edge && edge.properties && edge.properties.value != null) {
              const val = parseFloat(edge.properties.value);
              gravityScores[n.id] = val;
              if (val > maxVal) maxVal = val;
            }
          }
        });
        if (maxVal > 0) {
          Object.keys(gravityScores).forEach(k => { gravityScores[k] /= maxVal; });
        }
      } else {
        gravityScores = {};
        let maxVal = 0;
        graphData.nodes.forEach(n => {
          if (n.label === 'Model') {
            const val = parseFloat(n[metric] || n.properties?.[metric] || 0);
            if (val > 0) {
              const scaled = (metric === 'total_parameters' || metric === 'context_window')
                ? Math.log10(val) : val;
              gravityScores[n.id] = scaled;
              if (scaled > maxVal) maxVal = scaled;
            }
          }
        });
        if (maxVal > 0) {
          Object.keys(gravityScores).forEach(k => { gravityScores[k] /= maxVal; });
        }
      }

      const count = Object.keys(gravityScores).length;
      status.textContent = `${count} models attracted`;
      gravityActive = true;
      createGravityWellMesh();
      gravityWellMesh.visible = true;
      applyGravityForce();
    }

    // Exponential slider mapping (from beestgraph)
    // Low end is fine-grained, high end ramps aggressively
    function expScale(sliderVal) {
      if (sliderVal === 0) return 0;
      return (Math.exp(sliderVal / 25) - 1) / (Math.exp(4) - 1);
    }

    let gravitySliderVal = 0;

    function updateGravitySlider(val) {
      gravitySliderVal = Number(val);
      const pct = Math.round(expScale(gravitySliderVal) * 100);
      document.getElementById('gravity-val').textContent = pct + '%';
      if (gravityActive) applyGravityForce();
    }

    function applyGravityForce() {
      const strength = expScale(gravitySliderVal);
      const wellX = GRAVITY_WELL_POS.x, wellY = GRAVITY_WELL_POS.y, wellZ = GRAVITY_WELL_POS.z;
      graph3d.d3Force('gravity', (alpha) => {
        graphData.nodes.forEach(n => {
          const rawScore = gravityScores[n.id];
          if (rawScore != null && rawScore > 0) {
            const pull = alpha * strength * rawScore * 200.0;
            n.vx += (wellX - n.x) * pull * 0.01;
            n.vy += (wellY - n.y) * pull * 0.01;
            n.vz += (wellZ - n.z) * pull * 0.01;
          } else if (n.label === 'Model') {
            const push = alpha * strength * 30.0;
            const dx = n.x - wellX, dy = n.y - wellY, dz = n.z - wellZ;
            const dist = Math.max(1, Math.sqrt(dx*dx + dy*dy + dz*dz));
            n.vx += (dx / dist) * push;
            n.vy += (dy / dist) * push;
            n.vz += (dz / dist) * push;
          }
        });
      });
      graph3d.d3ReheatSimulation();
    }

    // ═══════════════════════════════════════════════════════════════
    // NODE VISIBILITY TOGGLES
    // ═══════════════════════════════════════════════════════════════

    let visibleLabels = new Set();  // Which node types are visible
    let hiddenSubs = new Set();     // "Model:llm-chat" = hidden subcategory
    let fullGraphData = null;       // Unfiltered copy of graph data

    function getNodeSub(node) {
      if (node.label === 'Model') return node.model_type || null;
      return null;
    }

    function isNodeVisible(node) {
      if (!visibleLabels.has(node.label)) return false;
      const sub = getNodeSub(node);
      if (sub && hiddenSubs.has(node.label + ':' + sub)) return false;
      return true;
    }

    function computeCategoryTree() {
      if (!fullGraphData) return {};
      const tree = {};
      fullGraphData.nodes.forEach(n => {
        if (!tree[n.label]) tree[n.label] = { total: 0, subs: {} };
        tree[n.label].total++;
        const sub = getNodeSub(n);
        if (sub) {
          tree[n.label].subs[sub] = (tree[n.label].subs[sub] || 0) + 1;
        }
      });
      // Only keep subs if 2+ distinct
      for (const label in tree) {
        if (Object.keys(tree[label].subs).length < 2) tree[label].subs = {};
      }
      return tree;
    }

    function renderVisibilityTree() {
      const tree = computeCategoryTree();
      const container = document.getElementById('visibility-tree');
      if (!container) return;

      const labelOrder = ['Model', 'Provider', 'Platform', 'Benchmark', 'Capability', 'Hardware', 'License', 'Tag'];
      const labels = labelOrder.filter(l => tree[l]);
      // Add any not in the order
      Object.keys(tree).forEach(l => { if (!labels.includes(l)) labels.push(l); });

      let html = '';
      labels.forEach(label => {
        const info = tree[label];
        const visible = visibleLabels.has(label);
        const hasSubs = Object.keys(info.subs).length > 0;
        const eyeClass = visible ? 'vis-eye' : 'vis-eye hidden';
        const eyeIcon = visible ? '&#128065;' : '&#128065;';
        const color = LABEL_COLORS[label] || '#64748b';

        html += `<div class="vis-row" onclick="toggleVisibility('${label}')">
          <span class="${eyeClass}">${eyeIcon}</span>
          <span class="vis-label" style="color:${color}">${label}</span>
          <span class="vis-count">${info.total}</span>
          ${hasSubs ? `<span class="vis-expand" onclick="event.stopPropagation();toggleSubExpand('${label}')">&#9660;</span>` : ''}
        </div>`;

        if (hasSubs) {
          const sorted = Object.entries(info.subs).sort((a, b) => b[1] - a[1]);
          html += `<div class="vis-sub" id="vis-subs-${label}" style="display:none">`;
          sorted.forEach(([sub, count]) => {
            const key = label + ':' + sub;
            const subVisible = visible && !hiddenSubs.has(key);
            const subEyeClass = subVisible ? 'vis-eye' : 'vis-eye hidden';
            const subColor = (label === 'Model' && TYPE_COLORS[sub]) ? TYPE_COLORS[sub] : color;
            html += `<div class="vis-row" onclick="event.stopPropagation();toggleSubVisibility('${key}')">
              <span class="${subEyeClass}">&#128065;</span>
              <span class="vis-label" style="color:${subColor}">${sub.replace(/-/g, ' ')}</span>
              <span class="vis-count">${count}</span>
            </div>`;
          });
          html += '</div>';
        }
      });

      container.innerHTML = html;
    }

    function toggleSubExpand(label) {
      const el = document.getElementById('vis-subs-' + label);
      if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function toggleVisibility(label) {
      if (visibleLabels.has(label)) visibleLabels.delete(label);
      else visibleLabels.add(label);
      applyVisibilityFilter();
    }

    function toggleSubVisibility(key) {
      if (hiddenSubs.has(key)) hiddenSubs.delete(key);
      else hiddenSubs.add(key);
      applyVisibilityFilter();
    }

    function showAllTypes() {
      if (!fullGraphData) return;
      visibleLabels = new Set(fullGraphData.nodes.map(n => n.label));
      hiddenSubs.clear();
      applyVisibilityFilter();
    }

    function hideAllTypes() {
      visibleLabels.clear();
      applyVisibilityFilter();
    }

    function modelsOnlyTypes() {
      visibleLabels = new Set(['Model']);
      hiddenSubs.clear();
      applyVisibilityFilter();
    }

    function applyVisibilityFilter() {
      if (!fullGraphData) return;

      const visibleNodes = fullGraphData.nodes.filter(n => isNodeVisible(n));
      const visibleIds = new Set(visibleNodes.map(n => n.id));
      const visibleLinks = fullGraphData.links.filter(e => {
        const srcId = e.source?.id || e.source;
        const tgtId = e.target?.id || e.target;
        return visibleIds.has(srcId) && visibleIds.has(tgtId);
      });

      graphData = { nodes: visibleNodes, links: visibleLinks };
      graph3d.graphData(graphData);

      document.getElementById('stat-nodes').textContent = visibleNodes.length;
      document.getElementById('stat-edges').textContent = visibleLinks.length;

      renderVisibilityTree();
    }

    // ═══════════════════════════════════════════════════════════════
    // SAVED RANKINGS (localStorage)
    // ═══════════════════════════════════════════════════════════════

    const SAVED_RANKINGS_KEY = 'modelspec_saved_rankings';

    function getSavedRankings() {
      try {
        return JSON.parse(localStorage.getItem(SAVED_RANKINGS_KEY) || '[]');
      } catch { return []; }
    }

    function populateSavedRankings() {
      const rankings = getSavedRankings();
      // Populate gravity well dropdown
      const gravSelect = document.getElementById('gravity-metric');
      const savedGroup = gravSelect.querySelector('optgroup[label="Saved Rankings"]');
      if (savedGroup) {
        savedGroup.innerHTML = '';
        rankings.forEach(r => {
          const opt = document.createElement('option');
          opt.value = `saved:${r.name}`;
          opt.textContent = r.name;
          savedGroup.appendChild(opt);
        });
      }
      // Populate saved ranking select
      const rankSelect = document.getElementById('saved-ranking-select');
      if (rankSelect) {
        rankSelect.innerHTML = '<option value="">Load a saved ranking...</option>';
        rankings.forEach((r, i) => {
          const opt = document.createElement('option');
          opt.value = i;
          const count = r.results ? r.results.length : 0;
          opt.textContent = `${r.name} (${count} models)`;
          rankSelect.appendChild(opt);
        });
      }
    }

    function loadSavedRankingToGraph() {
      const select = document.getElementById('saved-ranking-select');
      const idx = parseInt(select.value);
      const status = document.getElementById('ranking-filter-status');
      if (isNaN(idx)) { status.textContent = 'Select a ranking first'; return; }

      const rankings = getSavedRankings();
      const ranking = rankings[idx];
      if (!ranking || !ranking.results) { status.textContent = 'No results in this ranking'; return; }

      // Get model IDs from the ranking
      const modelIds = new Set(ranking.results.map(r => r.model_id));
      rankingFilterModels = modelIds;
      rankingFilterActive = true;

      // Filter the graph to only show these models + their connected nodes
      const filteredNodes = [];
      const filteredLinks = [];
      const includedIds = new Set();

      // Add ranked models
      graphData.nodes.forEach(n => {
        if (modelIds.has(n.id)) {
          filteredNodes.push(n);
          includedIds.add(n.id);
        }
      });

      // Add connected non-model nodes (providers, benchmarks, etc.)
      graphData.links.forEach(e => {
        const srcId = e.source?.id || e.source;
        const tgtId = e.target?.id || e.target;
        if (includedIds.has(srcId) || includedIds.has(tgtId)) {
          // Add the other end
          if (!includedIds.has(srcId)) {
            const node = graphData.nodes.find(n => n.id === srcId);
            if (node) { filteredNodes.push(node); includedIds.add(srcId); }
          }
          if (!includedIds.has(tgtId)) {
            const node = graphData.nodes.find(n => n.id === tgtId);
            if (node) { filteredNodes.push(node); includedIds.add(tgtId); }
          }
          filteredLinks.push(e);
        }
      });

      graph3d.graphData({ nodes: filteredNodes, links: filteredLinks });
      status.textContent = `Showing ${modelIds.size} ranked models + ${filteredNodes.length - modelIds.size} connected nodes`;

      document.getElementById('stat-nodes').textContent = filteredNodes.length;
      document.getElementById('stat-edges').textContent = filteredLinks.length;
    }

    function clearRankingFilter() {
      rankingFilterActive = false;
      rankingFilterModels = null;
      document.getElementById('ranking-filter-status').textContent = '';
      document.getElementById('saved-ranking-select').value = '';
      // Reload the full graph
      switchView(currentView);
    }

    async function switchView(viewId) {
      currentView = viewId;
      document.querySelectorAll('#view-buttons .view-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === viewId);
      });

      const data = await fetch(`${API}/api/v1/graph?view=${viewId}`).then(r => r.json());

      graphData = {
        nodes: data.nodes.map(n => ({
          id: n.id,
          display_name: n.display_name,
          label: n.label,
          model_type: n.model_type,
          total_parameters: n.total_parameters,
          properties: n.properties || {},
        })),
        links: data.edges.map(e => ({
          source: e.source,
          target: e.target,
          type: e.type,
          properties: e.properties || {},
        })),
      };

      // Store full data for visibility filtering
      fullGraphData = { nodes: [...graphData.nodes], links: [...graphData.links] };
      // Initialize all types as visible
      visibleLabels = new Set(graphData.nodes.map(n => n.label));
      hiddenSubs.clear();

      graph3d.graphData(graphData);

      document.getElementById('stat-nodes').textContent = data.nodes.length;
      document.getElementById('stat-edges').textContent = data.edges.length;
      document.getElementById('stat-view').textContent = viewId.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

      renderVisibilityTree();

      updateLegend(data.nodes);
    }

    function updateLegend(nodes) {
      const types = {};
      nodes.forEach(n => {
        if (n.label === 'Model') {
          const t = n.model_type || 'unknown';
          types[t] = (types[t] || 0) + 1;
        } else {
          const key = '_' + n.label;
          types[key] = (types[key] || 0) + 1;
        }
      });

      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      Object.entries(types).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
        const isLabel = type.startsWith('_');
        const displayName = isLabel ? type.substring(1) : type;
        const color = isLabel ? (LABEL_COLORS[displayName] || '#64748b') : (TYPE_COLORS[type] || '#64748b');
        const iconKey = isLabel ? type : type;
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `${legendSVG(iconKey, color)}${displayName} (${count})`;
        legend.appendChild(item);
      });
    }

    async function showNodeDetail(nodeId) {
      const data = await fetch(`${API}/api/v1/node/${encodeURIComponent(nodeId)}`).then(r => r.json());
      const panel = document.getElementById('detail-panel');
      const content = document.getElementById('detail-content');

      const isModel = data.label === 'Model';
      const color = isModel ? (TYPE_COLORS[data.properties.model_type] || '#64748b') : (LABEL_COLORS[data.label] || '#64748b');

      let html = `<span class="detail-label" style="background:${color}22;color:${color}">${data.label}${isModel && data.properties.model_type ? ' / ' + data.properties.model_type : ''}</span>`;
      html += `<div style="font-size:14px;font-weight:600;margin-bottom:8px">${data.properties.display_name || data.properties.name || data.id}</div>`;

      // Key properties
      html += '<div class="detail-props">';
      const skip = ['id', 'display_name', 'name'];
      const priority = ['model_type', 'status', 'total_parameters', 'context_window', 'cost_input', 'cost_output', 'arena_elo_overall', 'open_weights', 'origin_country', 'release_date', 'card_completeness'];

      const shown = new Set();
      priority.forEach(k => {
        const v = data.properties[k];
        if (v !== null && v !== undefined && v !== '' && v !== 0 && v !== false) {
          let display = v;
          if (k === 'total_parameters') display = (v / 1e9).toFixed(1) + 'B';
          else if (k === 'context_window') display = (v / 1000).toFixed(0) + 'K';
          else if (k.startsWith('cost_')) display = '$' + v + '/M';
          else if (k === 'card_completeness') display = v + '%';
          html += `<div><span class="key">${k.replace(/_/g, ' ')}:</span> <span class="val">${display}</span></div>`;
          shown.add(k);
        }
      });
      Object.entries(data.properties).forEach(([k, v]) => {
        if (skip.includes(k) || shown.has(k)) return;
        if (v === null || v === '' || v === 0 || v === false) return;
        html += `<div><span class="key">${k.replace(/_/g, ' ')}:</span> <span class="val">${v}</span></div>`;
      });
      html += '</div>';

      // Relationships
      if (data.relationships && data.relationships.length > 0) {
        html += '<div class="detail-rels"><h2 style="margin-top:8px">Relationships</h2>';
        // Group by type
        const grouped = {};
        data.relationships.forEach(r => {
          grouped[r.type] = grouped[r.type] || [];
          grouped[r.type].push(r);
        });
        Object.entries(grouped).forEach(([type, rels]) => {
          html += `<div style="margin-top:4px;color:#60a5fa;font-weight:500;font-size:10px">${type} (${rels.length})</div>`;
          rels.slice(0, 10).forEach(r => {
            const arrow = r.direction === 'outgoing' ? '&rarr;' : '&larr;';
            html += `<div class="rel-item">
              <span class="rel-arrow">${arrow}</span>
              <span class="rel-peer" onclick="showNodeDetail('${r.peer_id}')">${r.peer_name} (${r.peer_label})</span>
            </div>`;
          });
          if (rels.length > 10) html += `<div style="color:#475569;font-size:9px">... and ${rels.length - 10} more</div>`;
        });
        html += '</div>';
      }

      content.innerHTML = html;
      panel.classList.add('visible');

      // Focus camera
      const node = graphData.nodes.find(n => n.id === nodeId);
      if (node && node.x !== undefined) {
        graph3d.cameraPosition(
          { x: node.x + 80, y: node.y + 40, z: node.z + 80 },
          { x: node.x, y: node.y, z: node.z },
          800
        );
      }
    }

    function closeDetail() {
      document.getElementById('detail-panel').classList.remove('visible');
    }

    async function handleSearch(e) {
      const q = e.target.value.trim();
      const results = document.getElementById('search-results');
      if (q.length < 2) { results.innerHTML = ''; return; }

      const data = await fetch(`${API}/api/v1/search?q=${encodeURIComponent(q)}&limit=10`).then(r => r.json());
      results.innerHTML = data.results.map(d => {
        const color = d.label === 'Model' ? (TYPE_COLORS[d.properties.model_type] || '#64748b') : (LABEL_COLORS[d.label] || '#64748b');
        return `<div class="search-item" onclick="focusNode('${d.id}')">
          <span style="color:${color}">${d.label}</span> ${d.display_name || d.id}
        </div>`;
      }).join('');
    }

    function focusNode(nodeId) {
      showNodeDetail(nodeId);
      const node = graphData.nodes.find(n => n.id === nodeId);
      if (node && node.x !== undefined) {
        graph3d.cameraPosition(
          { x: node.x + 80, y: node.y + 40, z: node.z + 80 },
          { x: node.x, y: node.y, z: node.z },
          800
        );
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // CONTROLS
    // ═══════════════════════════════════════════════════════════════

    function toggleLabels() {
      labelsVisible = !labelsVisible;
      document.getElementById('btn-labels').classList.toggle('active', labelsVisible);
      graph3d.nodeThreeObject(graph3d.nodeThreeObject());
    }

    function debounce(fn, ms) {
      let timer;
      return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), ms); };
    }

    window.addEventListener('resize', () => {
      if (graph3d) graph3d.width(window.innerWidth).height(window.innerHeight);
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetail();
    });

    init().catch(err => {
      console.error('Init failed:', err);
      document.getElementById('loading').innerHTML =
        `<div style="color:#ef4444">Failed to load: ${err.message}</div>`;
    });
  </script>
</body>
</html>
